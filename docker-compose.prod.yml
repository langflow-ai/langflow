# Lothal production stack — backend + frontend + Postgres only.
#
# Trimmed from deploy/docker-compose.yml: no Traefik/Swarm, no celery/rabbitmq/
# redis/prometheus/grafana/pgadmin/flower. TLS + public routing are handled by the
# *host* nginx (see deploy/nginx/lothal.conf), which reverse-proxies to the frontend
# container published on 127.0.0.1:8080. Backend and Postgres stay on the internal
# compose network and are never published to the host.
#
# Env comes from a sibling .env file (see deploy/.env.prod.example). On the server
# this lives at /opt/lothal/.env.
#
#   docker compose -f docker-compose.prod.yml up -d

name: lothal

services:
  db:
    image: postgres:16-trixie  # pinned base; avoids the postgres:16 glibc collation roll (issue #9608)
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - lothal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # intentionally no `ports:` — only reachable inside the compose network

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/realbytecode/lothal-backend:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      LANGFLOW_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LANGFLOW_CONFIG_DIR: /app/langflow
      LANGFLOW_HOST: 0.0.0.0
      LANGFLOW_PORT: "7860"
      # ── Access control — locked down for prod, deliberately NOT .env-overridable ──
      # These are hardcoded literals (no ${...} interpolation) so a fumbled or
      # tampered /opt/lothal/.env can never reopen the app. The site is invite-only:
      # the superuser provisions accounts via the /admin page; nobody self-registers.
      #   AUTO_LOGIN=false      -> no anonymous superuser session; real credentials required.
      #   ENABLE_SIGNUP=false   -> public POST /api/v1/users 403s ("Sign up is currently
      #                            disabled."); a logged-in superuser can still create users.
      #   NEW_USER_IS_ACTIVE=false -> new accounts start inactive until the superuser
      #                            activates them in /admin (belt-and-suspenders).
      # To intentionally relax any of these (e.g. a throwaway demo), edit this file in a
      # reviewed commit — do not move them back to env vars.
      LANGFLOW_AUTO_LOGIN: "false"
      LANGFLOW_ENABLE_SIGNUP: "false"
      LANGFLOW_NEW_USER_IS_ACTIVE: "false"
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD}
      LANGFLOW_SECRET_KEY: ${LANGFLOW_SECRET_KEY}
      # Lothal LLM interface — consumed by the Epic 0+ engines. The only
      # implemented provider is "claude" (Claude Agent SDK over a Claude Code
      # subscription); it reads LOTHAL_LLM_PROVIDER + LOTHAL_MODEL_NAME and
      # authenticates with CLAUDE_CODE_OAUTH_TOKEN. Without that token call_llm
      # raises LLMConfigError (every LLM endpoint 503s), so it must be set in prod.
      # NB: a set ANTHROPIC_API_KEY silently overrides the subscription and bills
      # per-token — deliberately not passed through here.
      LOTHAL_LLM_PROVIDER: ${LOTHAL_LLM_PROVIDER:-claude}
      LOTHAL_MODEL_NAME: ${LOTHAL_MODEL_NAME:-}
      # Required: fail compose at parse time rather than booting into runtime 503s.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:?CLAUDE_CODE_OAUTH_TOKEN is required in production}
      # Lothal LLM gateway (Epic U.3) — the OpenAI-compatible endpoint Open Design's
      # agent calls (/api/v1/lothal/gateway/v1/chat/completions). By DEFAULT it runs
      # OD's calls on the subscription above (CLAUDE_CODE_OAUTH_TOKEN) by translating
      # OpenAI ⇄ Anthropic — no extra key, tools + streaming intact. Setting BOTH of
      # the upstream vars below switches it to a verbatim pass-through on a metered
      # key (takes precedence). The inbound token, when set, must match OD's
      # agentCliEnv.codex OPENAI_API_KEY (wired in U.4; see deploy/RUNBOOK.md).
      LOTHAL_GATEWAY_UPSTREAM_BASE_URL: ${LOTHAL_GATEWAY_UPSTREAM_BASE_URL:-}
      LOTHAL_GATEWAY_UPSTREAM_API_KEY: ${LOTHAL_GATEWAY_UPSTREAM_API_KEY:-}
      LOTHAL_GATEWAY_TOKEN: ${LOTHAL_GATEWAY_TOKEN:-}
      # Prototype stage ↔ Open Design (Epic U.4–U.9). The backend reaches OD over
      # the compose network at http://open-design:7456 (the default; no token —
      # OD_DISABLE_API_AUTH below). LOTHAL_OD_PUBLIC_BASE_URL is the *browser-facing*
      # OD origin used to build the embed iframe URL (U.9) — the od.<domain>
      # subdomain fronted by host nginx; leave blank to disable the embed (the pane
      # then lists artifacts instead of embedding OD). LOTHAL_OD_AGENT_ID must name
      # an agent that is installed AND available in the OD image (verify via
      # GET <od>/api/agents — e.g. "claude"; the bare image's default "codex" is not).
      LOTHAL_OD_PUBLIC_BASE_URL: ${LOTHAL_OD_PUBLIC_BASE_URL:-}
      LOTHAL_OD_AGENT_ID: ${LOTHAL_OD_AGENT_ID:-claude}
      # Scope the auth cookie to the registrable domain so it is also sent to the
      # od.<domain> subdomain — that is what lets host nginx auth_request-gate the
      # embedded OD by the logged-in Lothal session (see deploy/nginx/lothal.conf).
      # Must be ".<domain>" (leading dot), e.g. ".lothal.app".
      LANGFLOW_COOKIE_DOMAIN: ${LANGFLOW_COOKIE_DOMAIN:-}
    volumes:
      - lothal-langflow-data:/app/langflow  # secret_key, profile pics, etc. — must persist
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7860/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    # intentionally no `ports:` — fronted by the frontend container via /api

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/realbytecode/lothal-frontend:latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:7860   # container nginx proxies /api + /health here
      FRONTEND_PORT: "8080"              # unprivileged nginx binds 8080 (not 80)
    ports:
      - "127.0.0.1:8080:8080"            # host nginx (TLS) reverse-proxies to this

  # Open Design (OD) — internal design daemon consumed by the backend over the
  # compose network at http://open-design:7456. The image is built + published by
  # the separate realbytecode/open-design repo's own workflow (Epic U.2) as
  # `ghcr.io/realbytecode/od`, NOT by the Lothal deploy workflow (which builds
  # backend/frontend only). That image bakes in the Claude Code agent so the
  # daemon has an available agent on boot. Its version is pinned via OD_IMAGE in
  # /opt/lothal/.env and rolled by editing that value, not by a code deploy.
  open-design:
    image: ${OD_IMAGE:-ghcr.io/realbytecode/od:latest}
    restart: unless-stopped
    environment:
      # Access control is the network boundary, not a token: OD has no `ports:`, so
      # it is reachable only by other services on the internal compose network (the
      # backend at http://open-design:7456) — the same model as backend:7860, which
      # is likewise unpublished and unauthenticated on this network.
      #
      # The image binds 0.0.0.0, and the daemon refuses to start on a public bind
      # unless EITHER a token is set OR auth is explicitly disabled (server.ts
      # bound-API-token guard). So by default we disable auth and stay open on the
      # private network. For defense-in-depth, set BOTH of these in /opt/lothal/.env:
      #   OD_API_TOKEN=<openssl rand -hex 32>   and   OD_DISABLE_API_AUTH=0
      # — the token is then enforced (api-token-auth.ts) and the backend must send it
      # as a bearer. The token is passed through here so that path works via .env
      # alone, with no edit to this committed file.
      OD_API_TOKEN: ${OD_API_TOKEN:-}
      OD_DISABLE_API_AUTH: ${OD_DISABLE_API_AUTH:-1}
      # OD's origin-guard (origin-validation.ts) rejects /api writes whose Host is a
      # DNS name that isn't loopback/private-IP, UNLESS the request's Origin is in
      # this allow-list. Two origins must be listed (U.9): the backend's internal
      # base "http://open-design:7456" (ODClient sends it as Origin so config writes
      # — agent gateway + onboarding bypass — succeed) and the browser-facing
      # "https://od.<domain>" the embedded web UI calls /api from. Comma-separated.
      OD_ALLOWED_ORIGINS: ${OD_ALLOWED_ORIGINS:-http://open-design:7456}
      # Route OD's own LLM calls through Lothal's gateway (Story U.3/U.9). OD's
      # `claude` agent and its memory-llm read the LLM endpoint from the *container*
      # environment (process.env.ANTHROPIC_BASE_URL) — NOT from OD's per-agent
      # config — so the gateway URL must live here, on the container, to take
      # effect. claude appends `/v1/messages`, so the base omits `/v1`. The token
      # is only an inbound pass to the gateway (it injects the real subscription
      # upstream), so any non-empty value works while the gateway's inbound auth is
      # off; if you set LOTHAL_GATEWAY_TOKEN (inbound auth on), override the token
      # vars below to match. claude needs a writable config dir — the image is
      # read-only except the /app/.od volume.
      #
      # These DEFAULT to the in-compose backend + an off-auth placeholder, so OD's
      # claude works out of the box without any /opt/lothal/.env entries (a host on
      # an older .env stays working rather than silently dropping into the broken
      # not-logged-in path). Override in .env only for a different topology or a
      # locked-down gateway.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://backend:7860/api/v1/lothal/gateway}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-lothal}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-lothal}
      CLAUDE_CONFIG_DIR: ${CLAUDE_CONFIG_DIR:-/app/.od/.claude}
    ports:
      # Published on loopback ONLY so the *host* nginx can reverse-proxy the
      # od.<domain> vhost to it for the U.9 embed. It is NOT publicly exposed: host
      # nginx gates that vhost with auth_request → the logged-in Lothal session
      # (deploy/nginx/lothal.conf). The backend still reaches OD over the compose
      # network (open-design:7456), not via this published port.
      - "127.0.0.1:7456:7456"
    volumes:
      - lothal-od-data:/app/.od          # projects + daemon state — must persist across recreation
    healthcheck:
      # Mirrors OD's own prod healthcheck: node 24 ships a global fetch().
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Hardening carried over from OD's own prod compose: the daemon only ever
    # writes to /app/.od (the mounted volume) and /tmp.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OD_MEM_LIMIT:-384m}
    pids_limit: 256
    # intentionally no `ports:` — only reachable inside the compose network

volumes:
  lothal-db-data:
  lothal-langflow-data:
  lothal-od-data:
