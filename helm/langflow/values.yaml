# -- Employee number (required). Determines ingress hostname and access control.
empno: ""

image:
  repository: dk02315/langflow-hynix
  tag: v1.8.0-hynix-rc2
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  domain: aipp02.skhynix.com
  annotations: {}

keycloak:
  serverUrl: ""          # e.g. https://keycloak.skhynix.com
  realm: ""
  clientId: ""
  clientSecret: ""       # ignored if existingSecret is set
  employeeClaim: preferred_username
  buttonText: "SK하이닉스 SSO 로그인"
  # -- Use an existing K8s secret for clientSecret & langflow secretKey
  existingSecret: ""
  existingSecretKeys:
    clientSecret: client-secret
    langflowSecretKey: langflow-secret-key

# -- SSL CA certificate for Keycloak (corporate PKI)
ssl:
  # -- Enable to mount a CA cert and set SSL_CERT_FILE + REQUESTS_CA_BUNDLE
  enabled: false
  # -- Option 1: provide CA cert PEM content directly
  caCert: ""
  # -- Option 2: use an existing ConfigMap or Secret containing the CA cert
  existingConfigMap: ""
  existingSecret: ""
  # -- Key name inside the ConfigMap/Secret
  key: ca.crt

langflow:
  secretKey: ""          # ignored if existingSecret is set
  storage: 5Gi
  storageClass: ""       # e.g. sc-nfs-app-retain

# -- NFS PersistentVolume (created automatically when nfs.enabled=true)
nfs:
  enabled: false
  server: ""             # e.g. 10.0.0.1
  basePath: ""           # e.g. /nfs/langflow  (subdirectory /<empno> is appended automatically)
  mountOptions: []       # e.g. ["nfsvers=3"] for older NFS servers

resources: {}
