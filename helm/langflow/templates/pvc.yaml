apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "langflow.fullname" . }}-data
  labels:
    {{- include "langflow.labels" . | nindent 4 }}
spec:
  {{- if .Values.langflow.storageClass }}
  storageClassName: {{ .Values.langflow.storageClass }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.langflow.storage }}
