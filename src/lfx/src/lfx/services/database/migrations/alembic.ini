# Alembic config for lfx's own migration stream.
#
# The lfx runtime (DatabaseService / `lfx db`) builds the alembic Config
# programmatically -- setting script_location and sqlalchemy.url from settings --
# so this file is only used when driving migrations with the bare `alembic` CLI
# from this directory. `sqlalchemy.url` is intentionally left as a placeholder;
# pass `-x` / env or use `lfx db` instead.

[alembic]
script_location = .
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
