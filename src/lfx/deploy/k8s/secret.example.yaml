# Secret hydration for an lfx deployment (EXAMPLE -- do not commit real values).
#
# The database connection string (with credentials) and any provider API keys
# are secrets and must never live in the ConfigMap or lfx.toml. Create the real
# Secret out of band, e.g.:
#
#   kubectl create secret generic lfx-secrets \
#     --from-literal=LANGFLOW_DATABASE_URL='postgresql://user:pass@pg-host:5432/lfx'
#
# ...or manage it through your secrets operator (External Secrets, Sealed
# Secrets, Vault). This file only documents the shape.
apiVersion: v1
kind: Secret
metadata:
  name: lfx-secrets
  labels:
    app: lfx
type: Opaque
stringData:
  # Tier 1 database connection. Async driver is applied automatically
  # (postgresql -> postgresql+psycopg, sqlite -> sqlite+aiosqlite).
  LANGFLOW_DATABASE_URL: "postgresql://REPLACE_USER:REPLACE_PASSWORD@REPLACE_HOST:5432/lfx"

  # The serve API key clients present as x-api-key (if you front flows with one).
  # LANGFLOW_SERVE_API_KEY: "REPLACE_ME"
