    "lfx-bundles[pgvector]",
    "lfx-bundles[pinecone]",
    "lfx-bundles[qdrant]",
    "lfx-bundles[sambanova]",
    "lfx-bundles[scrapegraph]",
    "lfx-bundles[serpapi]",
    "lfx-bundles[supabase]",
