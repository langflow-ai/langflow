[project]
name = "lfx-talordata"
version = "0.1.0"
description = "Talordata SERP API component as a standalone Langflow Extension Bundle."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "MIT" }
authors = [
    { name = "Talordata" },
]
keywords = ["langflow", "lfx", "extension", "bundle", "talordata", "serp", "search"]
dependencies = [
    "lfx>=1.10.0.dev0,<2.0.0",
    "requests>=2.31.0,<3.0.0",
]

[project.urls]
Homepage = "https://www.talordata.com/products/serp-api"
Documentation = "https://docs.talordata.com/serp-api/query-parameters"
Repository = "https://github.com/Talordata/talordata-serp"

[project.entry-points."langflow.extensions"]
lfx-talordata = "lfx_talordata"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lfx_talordata"]
include = ["src/lfx_talordata/extension.json", "src/lfx_talordata/components/**/*.py"]

[tool.hatch.build.targets.sdist]
include = [
    "src/lfx_talordata",
    "README.md",
    "pyproject.toml",
]
