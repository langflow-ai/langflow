[project]
name = "lfx-empiriolabs"
version = "0.1.1"
description = "EmpirioLabs components (OpenAI-compatible chat models and image generation) as a standalone Langflow Extension Bundle."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "MIT" }
authors = [
    { name = "Langflow", email = "contact@langflow.org" },
]
keywords = ["langflow", "lfx", "extension", "bundle", "empiriolabs", "openai", "llm"]

# Runtime deps: lfx (the BUNDLE_API surface) plus the third-party imports the
# bundle's components rely on. EmpirioLabs exposes an OpenAI-compatible API, so
# the chat-model component reuses ``langchain_openai.ChatOpenAI``; both
# components fetch the live model list (and the image component POSTs the
# generation request) over the EmpirioLabs HTTP API via ``requests``. This
# mirrors the existing OpenAI-compatible provider bundles (novita, cometapi),
# which declare the same two runtime deps.
# lfx is floored at the current major.minor line and capped below the next lfx
# major; the floor is read from src/lfx/pyproject.toml at port time and
# re-synced on ``make patch`` via scripts/ci/sync_bundle_lfx_pin.py.
# Fine-grained BUNDLE_API compatibility is enforced via extension.json's
# lfx.compat list against BUNDLE_API_VERSION.
dependencies = [
    "lfx>=1.12.0.dev0,<2.0.0",
    "langchain-openai>=1.1.6",
    "requests>=2.32.0",
]

[project.urls]
Homepage = "https://github.com/langflow-ai/langflow"
Documentation = "https://docs.langflow.org/extensions"
Repository = "https://github.com/langflow-ai/langflow"

# Manifest-shipping distributions are discovered via the
# ``langflow.extensions`` entry-point.  Editable installs whose
# ``dist.files`` only surfaces dist-info entries fall back to this
# entry-point to find the manifest.
[project.entry-points."langflow.extensions"]
lfx-empiriolabs = "lfx_empiriolabs"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# extension.json + components live inside the lfx_empiriolabs package so
# ``importlib.metadata.files(dist)`` finds them and the loader resolves
# bundles[].path relative to the manifest's directory.
packages = ["src/lfx_empiriolabs"]
include = ["src/lfx_empiriolabs/extension.json", "src/lfx_empiriolabs/components/**/*.py"]

[tool.hatch.build.targets.sdist]
include = [
    "src/lfx_empiriolabs",
    "extension.json",
    "README.md",
    "pyproject.toml",
]
