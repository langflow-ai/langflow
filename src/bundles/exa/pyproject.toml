[project]
name = "lfx-exa"
version = "0.1.0"
description = "Exa web-search and contents tools (exa-py SDK) as a standalone Langflow Extension Bundle."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "MIT" }
authors = [
    { name = "Langflow", email = "contact@langflow.org" },
]
keywords = ["langflow", "lfx", "extension", "bundle", "exa", "search"]

# Runtime deps: lfx (the BUNDLE_API surface) plus the third-party imports the
# component uses directly.  ``exa-py`` replaces the deprecated
# ``metaphor-python`` SDK the pre-1.11 component shipped with; the legacy
# ``metaphor_api_key`` input is kept (hidden) so old saved flows keep working.
# ``langchain-core`` is already an lfx dep but is listed here as a direct
# runtime dep (the component imports ``langchain_core.tools.tool``) so the
# bundle keeps building even if lfx drops it later.
# lfx is floored at the current major.minor line and capped below the next lfx
# major; the floor is read from src/lfx/pyproject.toml at port time and
# re-synced on ``make patch`` via scripts/ci/sync_bundle_lfx_pin.py.
# Fine-grained BUNDLE_API compatibility is enforced via extension.json's
# lfx.compat list against BUNDLE_API_VERSION.
dependencies = [
    "lfx>=1.11.0.dev0,<2.0.0",
    "exa-py>=1.14,<3",
    "langchain-core>=1.2.28,<2.0.0",
]

[project.urls]
Homepage = "https://github.com/langflow-ai/langflow"
Documentation = "https://docs.langflow.org/extensions"
Repository = "https://github.com/langflow-ai/langflow"

# Manifest-shipping distributions are discovered via the
# ``langflow.extensions`` entry-point.  Editable installs whose
# ``dist.files`` only surfaces dist-info entries fall back to this
# entry-point to find the manifest.
[project.entry-points."langflow.extensions"]
lfx-exa = "lfx_exa"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# extension.json + components live inside the lfx_exa package so
# ``importlib.metadata.files(dist)`` finds them and the loader resolves
# bundles[].path relative to the manifest's directory.
packages = ["src/lfx_exa"]
include = ["src/lfx_exa/extension.json", "src/lfx_exa/components/**/*.py"]

[tool.hatch.build.targets.sdist]
include = [
    "src/lfx_exa",
    "extension.json",
    "README.md",
    "pyproject.toml",
]
