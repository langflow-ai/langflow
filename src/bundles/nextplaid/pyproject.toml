[project]
name = "lfx-nextplaid"
version = "0.1.0"
description = "NextPlaid multi-vector vector store (+ vLLM multivector embeddings) as a standalone Langflow Extension Bundle."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "MIT" }
authors = [
    { name = "Langflow", email = "contact@langflow.org" },
]
keywords = ["langflow", "lfx", "extension", "bundle", "nextplaid", "colbert", "plaid", "multi-vector", "vector-store"]

# Runtime deps: lfx (the BUNDLE_API surface) plus the third-party packages the
# bundled components import.
#
# * ``langchain-plaid`` wraps the NextPlaid server client used by
#   ``NextPlaidVectorStoreComponent``.  It transitively pulls ``requests``
#   (>=2.28.0), which ``VllmMultivectorEmbeddings`` also uses.
# * ``pillow`` backs the ColPali image path (``embed_images`` /
#   ``_data_to_pil``).  It is already an lfx dep, but is listed here so the
#   bundle keeps building if lfx drops it.
#
# lfx is floored at the current major.minor line (admitting the branch's own
# ``X.Y.0.devN`` nightlies under PEP 440) and capped below the next lfx major;
# the floor is re-synced on ``make patch`` via
# scripts/ci/sync_bundle_lfx_pin.py.  Fine-grained BUNDLE_API compatibility is
# enforced via extension.json's "lfx": {"compat": [...]} contract.
dependencies = [
    "lfx>=1.11.0.dev0,<2.0.0",
    "langchain-plaid>=0.1.0,<1.0.0",
    "pillow>=10.0.0",
]

[project.urls]
Homepage = "https://github.com/langflow-ai/langflow"
Documentation = "https://docs.langflow.org/extensions"
Repository = "https://github.com/langflow-ai/langflow"

# Manifest-shipping distributions are discovered via the
# ``langflow.extensions`` entry-point.  The value is the dotted path to the
# package containing ``extension.json`` -- the loader walks
# ``importlib.metadata.files()`` from there to find the manifest, and falls
# back to this entry-point for editable installs whose dist.files only
# surfaces dist-info entries.
[project.entry-points."langflow.extensions"]
lfx-nextplaid = "lfx_nextplaid"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# extension.json + components live inside the lfx_nextplaid package so
# ``importlib.metadata.files(dist)`` finds them and the loader resolves
# bundles[].path relative to the manifest's directory.
packages = ["src/lfx_nextplaid"]
include = ["src/lfx_nextplaid/extension.json", "src/lfx_nextplaid/components/**/*.py"]

[tool.hatch.build.targets.sdist]
include = [
    "src/lfx_nextplaid",
    "extension.json",
    "README.md",
    "pyproject.toml",
]
