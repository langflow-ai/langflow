[project]
name = "lfx-google-genai"
version = "0.1.0"
description = "Google Gemini chat model and embeddings."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "MIT" }
authors = [
    { name = "Langflow", email = "contact@langflow.org" },
]
keywords = ["langflow", "lfx", "extension", "bundle", "google", "google_genai"]

dependencies = [
    "lfx>=1.10.0,<2.0.0",
    "langchain-google-genai~=4.1.2",
    "pydantic>=2.10,<3.0",
]

[project.urls]
Homepage = "https://github.com/langflow-ai/langflow"
Documentation = "https://docs.langflow.org/extensions"
Repository = "https://github.com/langflow-ai/langflow"

[project.entry-points."langflow.extensions"]
lfx-google-genai = "lfx_google_genai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lfx_google_genai"]
include = [
    "src/lfx_google_genai/extension.json",
    "src/lfx_google_genai/components/**/*.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "src/lfx_google_genai",
    "extension.json",
    "README.md",
    "pyproject.toml",
]

[tool.ruff.lint.per-file-ignores]
"src/lfx_google_genai/components/google_genai/google_generative_ai_embeddings.py" = ['SLF001']
