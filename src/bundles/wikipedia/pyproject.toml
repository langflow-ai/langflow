[project]
name = "lfx-wikipedia"
version = "0.1.0"
description = "Wikipedia component(s) as a standalone Langflow Extension Bundle."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "MIT" }
authors = [
    { name = "Langflow", email = "contact@langflow.org" },
]
keywords = ["langflow", "lfx", "extension", "bundle", "wikipedia"]

# Runtime deps: lfx (the BUNDLE_API surface) plus the SDKs each component
# imports.  ``langchain-community`` carries ``WikipediaAPIWrapper`` which
# in turn pulls in the ``wikipedia`` PyPI package; we keep the explicit
# ``wikipedia`` pin to match what the pre-extraction
# ``langflow-base[wikipedia]`` extra installed.
dependencies = [
    "lfx>=1.10.0,<2.0.0",
    "langchain-community~=0.4.1",
    "langchain-core>=1.3.3,<2.0.0",
    "httpx>=0.27,<1.0.0",
    "wikipedia==1.4.0",
]

[project.urls]
Homepage = "https://github.com/langflow-ai/langflow"
Documentation = "https://docs.langflow.org/extensions"
Repository = "https://github.com/langflow-ai/langflow"

# Manifest-shipping distributions are discovered via the
# ``langflow.extensions`` entry-point.  Editable installs whose
# ``dist.files`` only surfaces dist-info entries fall back to this
# entry-point to find the manifest.
[project.entry-points."langflow.extensions"]
lfx-wikipedia = "lfx_wikipedia"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# extension.json + components live inside the lfx_wikipedia package so
# ``importlib.metadata.files(dist)`` finds them and the loader resolves
# bundles[].path relative to the manifest's directory.
packages = ["src/lfx_wikipedia"]
include = [
    "src/lfx_wikipedia/extension.json",
    "src/lfx_wikipedia/components/**/*.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "src/lfx_wikipedia",
    "extension.json",
    "README.md",
    "pyproject.toml",
]
