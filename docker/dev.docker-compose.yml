networks:
  dev-langflow:

services:
  langflow:
    build:
      context: ..
      dockerfile: docker/dev.Dockerfile
    image: dev-langflow
    container_name: dev-langflow
    restart: always
    ports:
      - "7860:7860"
      - "3000:3000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - LANGFLOW_DATABASE_URL=postgresql://langflow:langflow@postgres:5432/langflow
      - LANGFLOW_SUPERUSER=langflow
      - LANGFLOW_SUPERUSER_PASSWORD=langflow
      - LANGFLOW_CONFIG_DIR=/var/lib/langflow
    # The chat provider (LOTHAL_LLM_PROVIDER/CLAUDE_CODE_OAUTH_TOKEN) and the U.3
    # LLM gateway pass-through (LOTHAL_GATEWAY_UPSTREAM_BASE_URL/_API_KEY, optional
    # LOTHAL_GATEWAY_TOKEN) are both read from ../.env below.
    env_file:
      - ../.env
    volumes:
      - ../:/app
    depends_on:
      - postgres
    networks:
      -  dev-langflow


  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: langflow
      POSTGRES_PASSWORD: langflow
      POSTGRES_DB: langflow
    ports:
      - "5432:5432"
    networks:
      -  dev-langflow

  # Open Design (OD) sidecar — reachable from the langflow container at
  # http://open-design:7456. Pulls the published image (override OD_IMAGE to test
  # a specific build). Auth is disabled for local dev; port is published so the OD
  # web UI / API can be poked directly at http://localhost:7456.
  open-design:
    image: ${OD_IMAGE:-ghcr.io/realbytecode/open-design:latest}
    container_name: open-design
    restart: always
    environment:
      OD_DISABLE_API_AUTH: "1"
    ports:
      - "7456:7456"
    volumes:
      - od-data:/app/.od
    networks:
      -  dev-langflow

volumes:
  od-data:

