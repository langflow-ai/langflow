name: GP Upload Strings

on:
  push:
    branches:
      - main
      - feat/globalization-pipeline  # temp: remove before merge
    paths:
      - "src/frontend/src/locales/en.json"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    name: Upload English strings to Globalization Pipeline
    environment: GP_TEST

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/gp/requirements.txt

      - name: Upload strings to GP
        working-directory: scripts/gp
        env:
          GP_ADMIN_USER_ID: ${{ secrets.GP_ADMIN_USER_ID }}
          GP_ADMIN_PASSWORD: ${{ secrets.GP_ADMIN_PASSWORD }}
          GP_INSTANCE: ${{ secrets.GP_INSTANCE }}
          GP_BUNDLE: ${{ secrets.GP_BUNDLE }}
        run: |
          python upload_strings.py --source ../../src/frontend/src/locales/en.json
