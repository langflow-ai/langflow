name: Codeflash

on:
  pull_request:
    paths:
      - "src/backend/base/langflow/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optimize:
    name: Optimize new Python code in this PR
    if: ${{ github.actor != 'codeflash-ai[bot]' }}
    runs-on: ubuntu-latest
    env:
      CODEFLASH_API_KEY: ${{ secrets.CODEFLASH_API_KEY }}
      CODEFLASH_PR_NUMBER: ${{ github.event.number }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Set Up Python & UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: 📦 Install Dependencies
        run: uv sync --extra dev

      - name: 🐞 Debug Secrets
        run: |
          echo "🔍 Checking if CODEFLASH_API_KEY is set..."
          if [[ -z "${CODEFLASH_API_KEY}" ]]; then
            echo "❌ CODEFLASH_API_KEY is NOT set! Exiting..."
            exit 1
          else
            echo "✅ CODEFLASH_API_KEY is set successfully!"
          fi

      - name: 🚀 Run Codeflash Optimizer
        working-directory: ./src/backend/base
        run: |
          echo "🔑 Setting API Key..."
          export CODEFLASH_API_KEY="${{ secrets.CODEFLASH_API_KEY }}"
          echo "✅ CODEFLASH_API_KEY has been set."
          uv run codeflash

      - name: 🗑️ Minimize UV Cache
        run: uv cache prune --ci
