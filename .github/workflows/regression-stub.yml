name: Regression Entry Stub

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to test with"
        required: true
      issue_title:
        description: "Issue title to test with"
        required: true

jobs:
  post-stub-comment:
    if: github.event.label.name == 'regression'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Get current minor version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "//;s/".*//')
          MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "file=regressions/${MINOR}.x.yaml" >> $GITHUB_OUTPUT

      - name: Post regression stub comment
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = context.payload.inputs?.issue_number ?? context.payload.issue.number;
            const issueTitle = context.payload.inputs?.issue_title ?? context.payload.issue.title;
            const file = "${{ steps.version.outputs.file }}";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `This issue has been labeled as a regression. Please add an entry to \`${file}\` and open a pull request targeting the active RC branch:

            \`\`\`yaml
            - id: GH-${issueNumber}
              title: ${JSON.stringify(issueTitle)}
              status: triage
              area: TBD        # can be one of: flow_editor | components | mcp | api | lfx | auth | database | integrations | starter_projects
              first_bad_version: TBD
              last_known_good_version: TBD
              workaround: none
            \`\`\`

            See [regressions/README.md](../blob/main/regressions/README.md) for field descriptions and valid values.`,
            });