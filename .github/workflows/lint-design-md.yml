name: Lint DESIGN.md

on:
  pull_request:
    paths:
      - "DESIGN.md"
      - ".github/workflows/lint-design-md.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  DESIGN_MD_CLI_VERSION: "0.1.1"

jobs:
  lint:
    name: Validate against DESIGN.md spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint DESIGN.md
        run: npx --yes @google/design.md@${{ env.DESIGN_MD_CLI_VERSION }} lint DESIGN.md
