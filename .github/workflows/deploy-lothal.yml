# Lothal production deploy — manual dispatch (story C.3).
#
# Build backend + frontend images from the chosen ref, tag them with the short
# git SHA, push to GHCR, then SSH to the RackNerd box and roll the stack:
#   pull → run alembic migrations → `docker compose up -d` → health-check /health.
#
# Pairs with docker-compose.prod.yml (repo root) and deploy/RUNBOOK.md. The box's
# /opt/lothal/.env stays the single source of prod config; this workflow only
# overrides the two image refs (BACKEND_IMAGE / FRONTEND_IMAGE) with SHA-tagged
# images. GHCR auth (push here, pull on the box) uses the built-in GITHUB_TOKEN —
# no PAT. SSH access uses the SSH_HOST / SSH_USER / SSH_KEY secrets (see RUNBOOK).
name: Deploy Lothal (manual)
run-name: Deploy ${{ inputs.ref }} to RackNerd by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to build and deploy."
        required: true
        type: string
        default: dev
      version:
        description: "Optional product version (e.g. 0.4) — also tags images :v0.4. Blank = SHA tag only."
        required: false
        type: string
        default: ""

concurrency:
  group: deploy-lothal
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: realbytecode/lothal-backend
  FRONTEND_IMAGE_NAME: realbytecode/lothal-frontend

jobs:
  # Resolve the dispatched ref to one exact commit first: the two image builds
  # run in parallel on separate runners, and checking the *branch* out twice
  # could race a push landing in between — both builds (and the SHA tag) must
  # come from the same commit.
  refs:
    name: Resolve ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_sha: ${{ steps.refs.outputs.full_sha }}
      sha: ${{ steps.refs.outputs.sha }}
      backend_image: ${{ steps.refs.outputs.backend_image }}
      frontend_image: ${{ steps.refs.outputs.frontend_image }}
      backend_version_image: ${{ steps.refs.outputs.backend_version_image }}
      frontend_version_image: ${{ steps.refs.outputs.frontend_version_image }}
      build_version: ${{ steps.refs.outputs.build_version }}
    steps:
      - name: Check out ${{ inputs.ref }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Compute image refs
        id: refs
        env:
          # Pass the dispatch input through env, never interpolate it directly
          # into the shell body (template injection). Validated below before use.
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          full_sha="$(git rev-parse HEAD)"
          sha="$(git rev-parse --short=12 HEAD)"
          echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${BACKEND_IMAGE_NAME}:${sha}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${FRONTEND_IMAGE_NAME}:${sha}" >> "$GITHUB_OUTPUT"
          echo "Building from ${full_sha} -> sha tag ${sha}"

          # Product version (the badge + an optional :v0.X image tag). The bare
          # value (no leading "v") is baked into the frontend bundle as the badge;
          # default "dev" for un-stamped builds. When a version is given we also
          # tag the images :v0.X (build-push skips the blank line otherwise).
          version_in="${VERSION_INPUT}"
          if [ -n "$version_in" ] && ! printf '%s' "$version_in" | grep -Eq '^v?[0-9]+(\.[0-9]+)*$'; then
            echo "::error::Invalid version '$version_in'. Expected forms like 0.4 or v0.4"
            exit 1
          fi
          bare="${version_in#v}"
          echo "build_version=${bare:-dev}" >> "$GITHUB_OUTPUT"
          if [ -n "$version_in" ]; then
            echo "backend_version_image=${REGISTRY}/${BACKEND_IMAGE_NAME}:v${bare}" >> "$GITHUB_OUTPUT"
            echo "frontend_version_image=${REGISTRY}/${FRONTEND_IMAGE_NAME}:v${bare}" >> "$GITHUB_OUTPUT"
            echo "Stamping badge v${bare} and tagging images :v${bare}"
          else
            echo "backend_version_image=" >> "$GITHUB_OUTPUT"
            echo "frontend_version_image=" >> "$GITHUB_OUTPUT"
            echo "No version given -> badge 'vdev', SHA tag only"
          fi

  # The RackNerd box is x86_64 and ubuntu-latest runners are amd64, so a single
  # linux/amd64 build is all that's needed — no QEMU, no multi-arch manifest.
  # Backend and frontend build concurrently; each keeps its own GHA cache scope.
  build-backend:
    name: Build & push backend
    needs: refs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out ${{ needs.refs.outputs.sha }}
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.refs.outputs.full_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/build_and_push_backend.Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ needs.refs.outputs.backend_image }}
            ${{ needs.refs.outputs.backend_version_image }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=lothal-backend
          cache-to: type=gha,mode=max,scope=lothal-backend

  build-frontend:
    name: Build & push frontend
    needs: refs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out ${{ needs.refs.outputs.sha }}
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.refs.outputs.full_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/frontend/build_and_push_frontend.Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          # Stamp the badge into the bundle (bare version, default "dev").
          build-args: |
            LOTHAL_VERSION=${{ needs.refs.outputs.build_version }}
          tags: |
            ${{ needs.refs.outputs.frontend_image }}
            ${{ needs.refs.outputs.frontend_version_image }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=lothal-frontend
          cache-to: type=gha,mode=max,scope=lothal-frontend

  deploy:
    name: Deploy to RackNerd
    needs: [refs, build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout (for the compose file)
        uses: actions/checkout@v6
        with:
          # Pin to the exact commit being deployed (not the default branch), so the
          # compose shipped to the box always matches the images built from this ref.
          ref: ${{ needs.refs.outputs.full_sha }}
          persist-credentials: false

      # Ship the topology (compose) from the deployed commit BEFORE deploying, so the
      # box never drifts from the repo. Only docker-compose.prod.yml is delivered —
      # /opt/lothal/.env (secrets + tunables) is server-owned and deliberately never
      # touched here. The compose holds no secrets, only ${VAR} references resolved
      # from that .env, so shipping it can never carry or overwrite a value.
      - name: Sync compose to box
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/lothal/
          overwrite: true

      - name: SSH → pull, migrate, up, health-check
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_IMAGE: ${{ needs.refs.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.refs.outputs.frontend_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,GHCR_USER,GHCR_TOKEN
          command_timeout: 20m
          # Fail-fast on any remote command error comes from `set -eu` in the
          # script below (appleboy/ssh-action@v1 has no script_stop input).
          script: |
            set -eu
            cd /opt/lothal

            # GHCR pull auth: the images are private under ghcr.io/realbytecode/*.
            # The deploy job's GITHUB_TOKEN (packages: read) is valid for this run.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Override only the image refs; everything else comes from /opt/lothal/.env,
            # which `docker compose` auto-loads (shell env wins over .env on interpolation).
            export BACKEND_IMAGE FRONTEND_IMAGE
            echo "Deploying:"
            echo "  backend  = $BACKEND_IMAGE"
            echo "  frontend = $FRONTEND_IMAGE"

            docker compose -f docker-compose.prod.yml pull

            # Apply DB migrations (non-destructive: `migration` runs `alembic upgrade head`
            # via initialize_services, then a migration test — NO --fix, which is destructive
            # and interactive). Fail the deploy here rather than crash-loop a new backend.
            docker compose -f docker-compose.prod.yml run --rm backend python -m langflow migration

            docker compose -f docker-compose.prod.yml up -d

            # Health-check the published frontend port; its nginx proxies /health -> backend,
            # so a 200 proves frontend + backend + DB are all up. Backend start_period is 90s.
            ok=
            for i in $(seq 1 30); do
              code="$(curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/health 2>/dev/null || true)"
              if [ "$code" = "200" ]; then ok=1; echo "health OK after ${i} attempt(s)"; break; fi
              echo "waiting for /health (attempt ${i}/30, got '${code}')"
              sleep 5
            done
            if [ -z "$ok" ]; then
              echo "::error::health check failed"
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=120 backend
              docker logout ghcr.io || true
              exit 1
            fi

            docker image prune -f
            docker logout ghcr.io || true

      - name: Public health & /lothal route check
        run: |
          set -eu
          curl -fsS https://lothal.app/health && echo "  -> https://lothal.app/health OK"
          code="$(curl -fsS -o /dev/null -w '%{http_code}' https://lothal.app/lothal)"
          echo "https://lothal.app/lothal -> HTTP ${code}"
