name: Docker Release (Keycloak SSO)

# v*-hynix 태그를 push하면 자동으로 GitHub Release 생성 + Docker 이미지 빌드/푸시
# 사용법: git tag v1.8.0-hynix-rc0 && git push origin v1.8.0-hynix-rc0

on:
  push:
    tags:
      - "v*-hynix"
  workflow_dispatch:
    inputs:
      tag:
        description: "빌드할 git 태그 (예: v1.8.0-hynix-rc0)"
        required: true
        type: string

jobs:
  release:
    name: Create Release & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Release 생성 권한
      packages: write   # ghcr.io 푸시 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/langflow-hynix
            ${{ secrets.DOCKERHUB_USERNAME }}/langflow-hynix
          tags: |
            type=raw,value=${{ steps.tag.outputs.name }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/keycloak-sso.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.name }}
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Docker Image

            **ghcr.io:**
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/langflow-hynix:${{ steps.tag.outputs.name }}
            ```

            **Docker Hub:**
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/langflow-hynix:${{ steps.tag.outputs.name }}
            ```

            ### 실행 예시

            ```bash
            docker run -p 7860:7860 \
              -e KEYCLOAK_ENABLED=true \
              -e KEYCLOAK_SERVER_URL=https://keycloak.company.com \
              -e KEYCLOAK_REALM=company \
              -e KEYCLOAK_CLIENT_ID=langflow \
              -e KEYCLOAK_CLIENT_SECRET=<secret> \
              -e KEYCLOAK_REDIRECT_URI=http://localhost:7860/api/v1/keycloak/callback \
              -e KEYCLOAK_SHARED_USERNAME=langflow-shared \
              -e KEYCLOAK_HCP_API_URL=http://hcp-api.com/v1/projects/your-project/roles \
              -e LANGFLOW_SECRET_KEY=<random-32-chars> \
              ghcr.io/${{ github.repository_owner }}/langflow-hynix:${{ steps.tag.outputs.name }}
            ```
