# Warning, do not check out untrusted code with
# the pull_request_target event.
name: Label PRs with Conventional Commits
on:
  pull_request_target:
    types: [opened, edited, synchronize]
  merge_group:

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Validate the pull request
        id: validate
        uses: Namchee/conventional-pr@v0.15.6
        with:
          access_token: ${{ secrets.GITHUB_TOKEN }}
          issue: false

  # NOTE: the upstream `label` job (bcoe/conventional-release-labels) was removed
  # on this fork — its GITHUB_TOKEN can't write labels here ("Resource not
  # accessible by integration"), so it failed on every PR. Conventional-commit
  # validation above still runs.
