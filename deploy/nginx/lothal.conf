# ─────────────────────────────────────────────────────────────────────────────
# Lothal — host nginx site (C.2).
# Terminates TLS for the domain and reverse-proxies to the frontend container
# published on 127.0.0.1:8080 by docker-compose.prod.yml. The frontend's own
# (in-container) nginx proxies /api + /health to the backend, so the host nginx
# only needs to forward everything to :8080.
#
# Install on the server (the file is placed at /opt/lothal/lothal.conf during bootstrap).
# The live domain is lothal.app; swap it below if deploying elsewhere:
#   sudo cp /opt/lothal/lothal.conf /etc/nginx/sites-available/lothal.conf
#   # replace __DOMAIN__ with the real domain:
#   sudo sed -i 's/__DOMAIN__/lothal.app/g' /etc/nginx/sites-available/lothal.conf
#   sudo ln -sf /etc/nginx/sites-available/lothal.conf /etc/nginx/sites-enabled/lothal.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   # obtain the cert (DNS for __DOMAIN__, www, AND od.__DOMAIN__ must already point
#   # at this box — the od.<domain> vhost below serves the embedded Open Design UI):
#   sudo certbot certonly --nginx -d lothal.app -d www.lothal.app -d od.lothal.app --non-interactive --agree-tos -m admin@lothal.app
#   sudo nginx -t && sudo systemctl reload nginx
#
# Embedded Open Design (Epic U.9): the od.__DOMAIN__ vhost reverse-proxies to the
# OD container (published on 127.0.0.1:7456 by docker-compose.prod.yml) and gates
# every request with auth_request → the backend's /api/v1/users/whoami, so only a
# logged-in Lothal user's browser (carrying the .__DOMAIN__-scoped access_token_lf
# cookie — set LANGFLOW_COOKIE_DOMAIN=.__DOMAIN__) can reach OD. Set the backend's
# LOTHAL_OD_PUBLIC_BASE_URL=https://od.__DOMAIN__ so the embed iframe points here.
# ─────────────────────────────────────────────────────────────────────────────

# Map for WebSocket upgrade (langflow build/playground sockets). http context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__ od.__DOMAIN__;

    # Let certbot's nginx authenticator answer ACME challenges during renewal.
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — canonical redirect www → apex (cert covers both names as SANs).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://__DOMAIN__$request_uri;
}

# HTTPS — terminate TLS, reverse-proxy to the frontend container.
server {
    # http2 via the listen directive (compatible with nginx < 1.25.1, e.g. 1.24 on Ubuntu 24.04)
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Self-contained TLS hardening (no dependency on certbot snippet files).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Uploads: allow generous bodies (the container nginx caps to its own limit).
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (build/playground).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE streaming (chat / diagram generation): no buffering, long timeouts.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# HTTPS — embedded Open Design (Epic U.9). Reverse-proxies to the OD container
# (127.0.0.1:7456) and gates every request by the logged-in Lothal session via
# auth_request. OD itself runs with OD_DISABLE_API_AUTH=1 (the network boundary +
# this gate ARE the access control); without the gate, OD's API would be publicly
# reachable and could spend the LLM subscription.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name od.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 100M;

    # Auth gate: validate the Lothal session before proxying anything to OD. The
    # subrequest hits the backend's whoami through the frontend container's /api
    # proxy, forwarding the browser's cookies; 200 → allow, 401/403 → deny. The
    # access_token_lf cookie reaches this subdomain only when the backend sets
    # LANGFLOW_COOKIE_DOMAIN=.__DOMAIN__ (same-site, so it rides into the iframe).
    location = /_lothal_auth {
        internal;
        proxy_pass http://127.0.0.1:8080/api/v1/users/whoami;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host              $host;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header Cookie            $http_cookie;
    }

    location / {
        auth_request /_lothal_auth;

        proxy_pass http://127.0.0.1:7456;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OD's chat is SSE; its previews may use WebSockets.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
