services:
  loki:
    image: grafana/loki:3.2.0
    container_name: lf-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  promtail:
    image: grafana/promtail:3.2.0
    container_name: lf-promtail
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml
      # Mount the directory that holds your langflow JSON log file.
      # Override LANGFLOW_LOG_DIR to point at your real log location.
      - ${LANGFLOW_LOG_DIR:-./logs}:/var/log/langflow:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: lf-prometheus
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/config.yml
    volumes:
      - ./prometheus/config.yml:/etc/prometheus/config.yml
    # Reach a Langflow running on the host (metrics on :9090) from inside the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: lf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_DEFAULT_THEME=dark
      # Postgres datasource for the worker roster. In production point these at a
      # READ-ONLY DB role, never the app's read-write credentials.
      - LANGFLOW_DB_HOST=${LANGFLOW_DB_HOST:-host.docker.internal}
      - LANGFLOW_DB_PORT=${LANGFLOW_DB_PORT:-5432}
      - LANGFLOW_DB_NAME=${LANGFLOW_DB_NAME:-langflow}
      - LANGFLOW_DB_USER=${LANGFLOW_DB_USER:-langflow}
      - LANGFLOW_DB_PASSWORD=${LANGFLOW_DB_PASSWORD:-langflow}
      - LANGFLOW_DB_SSLMODE=${LANGFLOW_DB_SSLMODE:-disable}
    # Reach a Langflow Postgres published on the host from inside the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
