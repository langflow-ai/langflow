services:
  langflow:
    image: langflowai/langflow:1.9.4 # or another version tag on https://hub.docker.com/r/langflowai/langflow
    pull_policy: always               # set to 'always' when using 'latest' image
    ports:
      - "7860:7860"
    depends_on:
      - postgres
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://langflow:langflow@postgres:5432/langflow
      # This variable defines where the logs, file storage, monitor data and secret keys are stored.
      - LANGFLOW_CONFIG_DIR=/app/langflow
    volumes:
      - ./volumes/langflow:/app/langflow
    networks:
      - langflow-network  # 加入自定义网络

  postgres:
    # Pinned to a specific Debian base (trixie) so the postgres:16 tag does not
    # silently roll its OS underneath us — that roll causes a glibc collation
    # version mismatch warning on existing volumes. Matches the langflow image
    # base. See https://github.com/langflow-ai/langflow/issues/9608
    image: postgres:16-trixie
    environment:
      POSTGRES_USER: langflow
      POSTGRES_PASSWORD: langflow
      POSTGRES_DB: langflow
    ports:
      - "5434:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - langflow-network  # 加入自定义网络

# 定义自定义网络
networks:
  langflow-network:
    driver: bridge
