# Per-employee Langflow deployment with Keycloak SSO
#
# Deploy:
#   export EMPNO=2074795
#   envsubst < k8s/langflow-deploy.yaml | kubectl apply -f -
#
# Delete:
#   export EMPNO=2074795
#   envsubst < k8s/langflow-deploy.yaml | kubectl delete -f -
#
# Ingress: http://langflow-${EMPNO}.aipp02.skhynix.com

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langflow-${EMPNO}-data
  labels:
    app: langflow
    empno: "${EMPNO}"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langflow-${EMPNO}
  labels:
    app: langflow
    empno: "${EMPNO}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langflow
      empno: "${EMPNO}"
  template:
    metadata:
      labels:
        app: langflow
        empno: "${EMPNO}"
    spec:
      containers:
        - name: langflow
          image: dk02315/langflow-hynix:${IMAGE_TAG:-v1.8.0-hynix-rc2}
          ports:
            - containerPort: 7860
          env:
            - name: KEYCLOAK_ENABLED
              value: "true"
            - name: KEYCLOAK_SERVER_URL
              value: "${KEYCLOAK_SERVER_URL}"
            - name: KEYCLOAK_REALM
              value: "${KEYCLOAK_REALM}"
            - name: KEYCLOAK_CLIENT_ID
              value: "${KEYCLOAK_CLIENT_ID}"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: langflow-keycloak-secret
                  key: client-secret
            - name: KEYCLOAK_REDIRECT_URI
              value: "http://langflow-${EMPNO}.aipp02.skhynix.com/api/v1/keycloak/callback"
            - name: KEYCLOAK_SHARED_USERNAME
              value: "langflow-${EMPNO}"
            - name: KEYCLOAK_ALLOWED_EMPLOYEE
              value: "${EMPNO}"
            - name: KEYCLOAK_EMPLOYEE_CLAIM
              value: "${KEYCLOAK_EMPLOYEE_CLAIM:-preferred_username}"
            - name: KEYCLOAK_BUTTON_TEXT
              value: "SK하이닉스 SSO 로그인"
            - name: LANGFLOW_AUTO_LOGIN
              value: "false"
            - name: LANGFLOW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langflow-keycloak-secret
                  key: langflow-secret-key
            - name: LANGFLOW_DATABASE_URL
              value: "sqlite+aiosqlite:////app/data/langflow.db"
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langflow-${EMPNO}-data

---
apiVersion: v1
kind: Service
metadata:
  name: langflow-${EMPNO}
  labels:
    app: langflow
    empno: "${EMPNO}"
spec:
  selector:
    app: langflow
    empno: "${EMPNO}"
  ports:
    - port: 80
      targetPort: 7860

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langflow-${EMPNO}
  labels:
    app: langflow
    empno: "${EMPNO}"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: langflow-${EMPNO}.aipp02.skhynix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langflow-${EMPNO}
                port:
                  number: 80
